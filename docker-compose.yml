services:
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: always

  fastapi:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: harshgpt_api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
    depends_on:
      - qdrant
      - redis
    volumes:
      - ./database:/app/database
    restart: always
    command: >
      sh -c "python app/services/ingestion.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  qdrant_storage: